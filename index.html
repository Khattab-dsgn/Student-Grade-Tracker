<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Grade Tracker — Track your courses and scores with a live-calculated average. Persistent data with local storage.">
  <title>Student Grade Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Ambient background orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">📊</span>
        <h1>GradeFlow</h1>
      </div>
      <p class="tagline">Track your academic progress beautifully</p>
    </header>

    <!-- Stats Dashboard -->
    <section class="stats-dashboard" aria-label="Grade statistics">
      <div class="stat-card stat-average">
        <div class="stat-icon" aria-hidden="true">🎯</div>
        <div class="stat-info">
          <span class="stat-label">Average Score</span>
          <span class="stat-value" id="average-score">—</span>
        </div>
        <div class="stat-ring" id="stat-ring">
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ring-progress" id="ring-progress" cx="50" cy="50" r="42" stroke-dasharray="263.9" stroke-dashoffset="263.9"></circle>
          </svg>
          <span class="ring-text" id="ring-text">—</span>
        </div>
      </div>
      <div class="stat-card stat-total">
        <div class="stat-icon" aria-hidden="true">📚</div>
        <div class="stat-info">
          <span class="stat-label">Total Courses</span>
          <span class="stat-value" id="total-courses">0</span>
        </div>
      </div>
      <div class="stat-card stat-highest">
        <div class="stat-icon" aria-hidden="true">🏆</div>
        <div class="stat-info">
          <span class="stat-label">Highest Score</span>
          <span class="stat-value" id="highest-score">—</span>
        </div>
      </div>
      <div class="stat-card stat-lowest">
        <div class="stat-icon" aria-hidden="true">📉</div>
        <div class="stat-info">
          <span class="stat-label">Lowest Score</span>
          <span class="stat-value" id="lowest-score">—</span>
        </div>
      </div>
    </section>

    <!-- Add Course Form -->
    <section class="form-section" aria-label="Add a new course">
      <div class="form-card">
        <h2 class="form-title">Add New Course</h2>
        <form id="grade-form" autocomplete="off">
          <div class="form-row">
            <div class="input-group">
              <label for="course-name">Course Name</label>
              <input
                type="text"
                id="course-name"
                placeholder="e.g. Linear Algebra"
                maxlength="100"
                required
              >
            </div>
            <div class="input-group">
              <label for="course-score">Score (0–100)</label>
              <input
                type="number"
                id="course-score"
                placeholder="e.g. 92"
                min="0"
                max="100"
                step="0.1"
                required
              >
            </div>
            <button type="submit" id="add-btn" class="btn-primary">
              <span class="btn-icon" aria-hidden="true">+</span>
              <span>Add Course</span>
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Course List -->
    <section class="list-section" aria-label="Course list">
      <div class="list-header">
        <h2 class="list-title">Your Courses</h2>
        <button id="clear-all-btn" class="btn-danger" style="display:none;">
          Clear All
        </button>
      </div>
      <div class="course-list" id="course-list">
        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
          <div class="empty-illustration" aria-hidden="true">🎓</div>
          <p class="empty-title">No courses yet</p>
          <p class="empty-subtitle">Add your first course above to start tracking your grades</p>
        </div>
      </div>
    </section>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
